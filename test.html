<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>功能测试</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
</head>

<body>
    <button class="btn" onclick="deleteFilteredRecords()">open modal</button>

    <script>
        const pbPath = "http://100.69.1.1:40329";
        const pb = new PocketBase(pbPath);

        async function deleteFilteredRecords(collectionName = 'dyxhs', filterStr = 'platform = "抖音"', concurrencyLimit = 5) {
            try {
                // 1. 先查出所有需要删除的 ID
                const records = await pb.collection(collectionName).getFullList({
                    filter: filterStr,
                    fields: 'id',
                });

                if (records.length === 0) {
                    console.log('没有找到匹配的数据');
                    return;
                }

                console.log(`共找到 ${records.length} 条数据，开始执行限制并发删除（限制数: ${concurrencyLimit}）...`);

                // 2. 核心并发控制逻辑
                const pool = new Set();
                const promises = [];

                for (const record of records) {
                    // 创建单个删除任务
                    const task = (async () => {
                        try {
                            await pb.collection(collectionName).delete(record.id);
                        } catch (err) {
                            console.error(`删除 ID: ${record.id} 失败`, err);
                        }
                    })();

                    promises.push(task);
                    pool.add(task);

                    // 任务完成后，从并发池中移除自己
                    task.then(() => pool.delete(task));

                    // 如果并发池满了，就等待池子里最快的一个任务完成，再往下走循环
                    if (pool.size >= concurrencyLimit) {
                        await Promise.race(pool);
                    }
                }

                // 等待最后留在池子里的残余任务全部执行完毕
                await Promise.all(promises);
                console.log('所有筛选数据处理完毕！');

            } catch (error) {
                console.error('查询或执行中出错:', error);
            }
        }
    </script>
</body>

</html>
