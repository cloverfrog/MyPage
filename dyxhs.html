<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>展示页</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/artplayer@latest/dist/artplayer.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/viewerjs@1.11.6/dist/viewer.min.css">
    <script src="https://cdn.jsdelivr.net/npm/viewerjs@1.11.6/dist/viewer.min.js"></script>
</head>

<body class="bg-base-200 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen">
    <!-- 顶部工具栏 -->
    <header class="border-b border-gray-200 p-4">
    </header>

    <!-- 卡片展示 -->
    <div class="mx-auto max-w-full px-4 py-4">
        <div x-data
            class="grid grid-cols-2 gap-x-6 gap-y-10 sm:grid-cols-2 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 2xl:grid-cols-10">
            <template x-for="note in $store.notes">
                <div x-on:click="$store.activeNote = note;console.log($store.activeNote)" class="group relative">
                    <img x-bind:src="note.cover" loading="lazy" alt=""
                        class="aspect-[3/4] w-full rounded-lg bg-gray-200 object-cover group-hover:opacity-75" />
                    <div class="absolute top-0 right-0 flex gap-0.5 p-1 z-10">
                        <span class="w-5 h-5 ">
                            <img x-bind:src="`/icons/${note.platform}.svg`" class="w-5 h-5">
                        </span>
                        <span class="w-5 h-5 ">
                            <img x-bind:src="`/icons/${note.type}.svg`" class="w-5 h-5">
                        </span>
                    </div>
                    <p x-text="note.title" class="mt-1 text-lg font-medium text-gray-900 truncate dark:text-white"></p>
                </div>
            </template>
        </div>
    </div>

    <!-- 模态框 -->
    <div x-data x-show="Object.keys($store.activeNote).length !== 0"
        :class="{ 'modal-open': Object.keys($store.activeNote).length !== 0 }"
        class="modal modal-open max-w-full bg-black/60 backdrop-blur-sm animate__animated animate__fadeIn"
        display="none" x-on:keydown.escape.window="$store.activeNote = {}">

        <!-- 背景遮罩 -->
        <div class="absolute inset-0 cursor-pointer" x-on:click="$store.activeNote = {}"></div>

        <div
            class="modal-box relative p-0 max-w-full max-h-[90vh] flex flex-col bg-white dark:bg-gray-900 border border-gray-100 dark:border-gray-800 shadow-2xl animate__animated animate__zoomIn animate__faster">

            <!-- 模态框头部 -->
            <div
                class="flex items-center justify-between p-4 border-b border-gray-100 dark:border-gray-800 bg-base-100 dark:bg-gray-900">
                <div class="flex items-center gap-2 truncate pr-4">
                    <span class="badge badge-neutral font-bold" x-text="$store.activeNote.platform"></span>
                    <h2 class="text-lg font-bold truncate text-gray-900 dark:text-white"
                        x-text="$store.activeNote.title"></h2>
                </div>
                <button x-on:click="$store.activeNote = {}" class="btn btn-sm btn-circle btn-ghost">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <!-- 模态框内容 -->
            <div class="p-6 overflow-y-auto flex-1 bg-base-200 dark:bg-gray-950">

                <!-- 视频内容 -->
                <template x-if="$store.activeNote.type === '视频'">
                    <div x-init="initVideoPlayer($el, {url: $store.activeNote.video})"
                        class="w-full aspect-square max-w-full max-h-[80vh] bg-neutral">
                    </div>
                </template>

                <!-- 图文内容 -->
                <template x-if="$store.activeNote.type === '图文'">
                    <div
                        class="grid grid-cols-1 gap-6 sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5">
                        <template x-for="(img, index) in $store.activeNote.images" :key="index">
                            <div class="bg-base-100 p-2 rounded-xl shadow-sm max-w-lg w-full">
                                <!-- live photo -->
                                <template x-if="img.live_photo">
                                    <div x-data="{ play_live: false }">
                                        <template x-if="!play_live">
                                            <img x-bind:src="img.image" loading="lazy"
                                                class="w-full rounded-lg object-contain h-auto h-full" alt="资源图片"
                                                x-on:click="play_live = true" />
                                        </template>
                                        <template x-if="play_live">
                                            <div x-init="initVideoPlayer($el, {url: img.video})"
                                                class="w-full aspect-square max-w-full max-h-[80vh] bg-neutral">
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <!-- 普通图片 -->
                                <template x-if="!img.live_photo">
                                        <img x-bind:src="img.image" loading="lazy"
                                            x-on:click="viewImageAdvanced($el)"
                                            class="w-full rounded-lg object-contain h-auto max-h-full" alt="资源图片" />
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </template>

            </div>
        </div>
    </div>

    <script>
        const pbPath = "http://100.69.1.1:40329";
        const pb = new PocketBase(pbPath);

        const resourcesPath = "http://100.69.1.1:40328/media/抖音小红书";

        const urlSearchParams = new URLSearchParams(window.location.search);

        async function getNotesData(filter, sort, forceRefresh = false) {
            const CACHE_EXPIRE = 259200000;
            const cacheKey = `dyxhs_cache_${btoa(unescape(encodeURIComponent(filter + '_' + sort)))}`;

            if (!forceRefresh) {
                const localCache = localStorage.getItem(cacheKey);
                if (localCache) {
                    try {
                        const { timestamp, data } = JSON.parse(localCache);
                        if (Date.now() - timestamp < CACHE_EXPIRE) {
                            console.log("使用本地缓存");
                            return data;
                        }
                    } catch (e) {
                        localStorage.removeItem(cacheKey);
                    }
                }
            }

            const records = await pb.collection('dyxhs').getFullList({ filter, sort });
            localStorage.setItem(cacheKey, JSON.stringify({ timestamp: Date.now(), data: records }));
            return records;
        }

        async function loadNotes(forceRefresh = false) {
            const records = await getNotesData(`author = "${urlSearchParams.get('author')}"`, '-time', forceRefresh);
            Alpine.store('notes', records.map(e => ({
                title: e.title,
                url: "#",
                cover: `${resourcesPath}/${e.platform}-${e.author}/${e.note_id}/${e.cover}`,
                platform: e.platform,
                type: { "normal": "图文", "video": "视频" }[e.type],
                video: `${resourcesPath}/${e.platform}-${e.author}/${e.note_id}/${e.video}`,
                images: e.images.map(i => ({
                    live_photo: i.live_photo,
                    image: `${resourcesPath}/${e.platform}-${e.author}/${e.note_id}/${i.image}`,
                    video: `${resourcesPath}/${e.platform}-${e.author}/${e.note_id}/${i.video}`
                }))
            })));
        }

        document.addEventListener('alpine:init', () => {
            Alpine.store('updating', false);
            Alpine.store('notes', []);
            Alpine.store('activeNote', {});

            loadNotes();
        });
    </script>

    <script>
        /**
         * 全局统一视频初始化函数（ArtPlayer 版）
         * @param {HTMLElement} el - 当前的外层 div 容器 (即 Alpine 的 $el)
         * @param {Object} customConfig - 单个视频的个性化配置（必须包含 url）
         */
        function initVideoPlayer(el, customConfig = {}) {
            // 1. 统一的全局默认配置（改这里，全站生效）
            const defaultConfig = {
                container: el,           // 挂载点直接设为当前 div 元素
                volume: 0.7,             // 默认音量
                autoplay: false,         // 自动播放
                loop: false,             // 循环播放
                theme: '#2563eb',        // 播放器主题色（这里用了 Tailwind 的 blue-600）

                // 以下是 ArtPlayer 极其强大的内置控制条开关
                setting: true,           // 开启右下角设置面板
                playbackRate: true,      // 开启倍速播放
                aspectRatio: false,       // 开启画面比例切换
                fullscreen: true,        // 开启全屏按钮
                fullscreenWeb: true,     // 开启网页样式全屏（移动端防黑屏流氓全屏的利器）
                pip: false,               // 开启画中画
                mutex: true,             // 多个播放器互斥（一个播放，另一个自动暂停）

                // 快捷键配置
                hotkey: true,

                // 移动端优化
                miniProgressBar: true,   // 移动端未点开时显示迷你进度条
                playsInline: true,       // 对应原生 playsinline
            };

            // 2. 合并默认配置和个性化配置
            const finalConfig = Object.assign({}, defaultConfig, customConfig);

            player = new Artplayer(finalConfig);

            return player;
        }

        /**
         * 全局单张图片高级放大查看器
         * @param {HTMLElement} imgEl - 原生 <img> 标签对象
         */
        function viewImageAdvanced(imgEl) {
            // 如果这张图片已经绑定过查看器，直接获取并显示
            if (imgEl._viewer) {
                imgEl._viewer.show();
                return;
            }

            // 初始化 Viewer.js
            const viewer = new Viewer(imgEl, {
                inline: false,       // 弹窗模式
                button: true,        // 显示右上角关闭按钮
                navbar: false,       // 单张图片不需要底部的缩略图导航条
                title: false,        // 不显示图片标题
                toolbar: {           // 自定义底部工具栏按钮
                    zoomIn: 1,
                    zoomOut: 1,
                    oneToOne: 1,
                    reset: 1,
                    prev: 0,           // 隐藏单图不需要的切换按钮
                    play: 0,
                    next: 0,
                    rotateLeft: 1,
                    rotateRight: 1,
                    flipHorizontal: 1,
                    flipVertical: 1,
                },
                // 核心功能默认开启：
                zoomable: true,      // 支持鼠标滚轮、双指缩放
                movable: true,       // 支持鼠标、单指拖动
                transition: true,    // 动画过渡
            });

            // 挂载到图片元素上缓存起来，防止重复创建
            imgEl._viewer = viewer;
            // 立刻展示
            viewer.show();
        }
    </script>
</body>

</html>
