<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人展示页</title>
    <!-- 1. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 2. Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!-- 3. Alpine.js (注意：官方建议放头部并加 defer) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 antialiased">

    <!-- 这是一个带出场动画和交互的展示卡片 -->
    <div class="max-w-md mx-auto mt-20 p-6 bg-slate-800 rounded-2xl shadow-xl animate__animated animate__fadeInUp"
         x-data="{ liked: false }">
        
        <h2 class="text-2xl font-bold text-white mb-2">探索新世界</h2>
        <p class="text-slate-400 leading-relaxed mb-4">
            只用纯 HTML + CDN 就能做出极为精致的现代网页界面，告别臃肿的现代前端打包工具。
        </p>

        <!-- Alpine.js 交互：点击切换状态和 Tailwind 样式 -->
        <button @click="liked = !liked" 
                :class="liked ? 'bg-rose-500' : 'bg-indigo-500 hover:bg-indigo-600'"
                class="px-4 py-2 rounded-xl font-medium transition-colors duration-300">
            <span x-text="liked ? '❤️ 已收藏' : '✨ 收藏此页'"></span>
        </button>
    </div>

    <!-- 4. Lucide 图标初始化 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
